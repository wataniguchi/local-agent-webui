# Pinned explicitly rather than left to default to the directory name.
# Compose normally derives the project name from whatever folder you happen
# to run it from — meaning a renamed/relocated project directory silently
# creates a SECOND, disconnected set of containers and volumes rather than
# managing the existing ones. Pinning this avoids that trap for good.
name: local-agent-webui

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      # Ollama is expected to run NATIVELY on the Mac host (brew install ollama;
      # ollama serve), not in Docker — Docker Desktop on Apple Silicon doesn't
      # pass through Metal, so native is much faster for inference.
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WEBUI_AUTH=True
      # Web search via the self-hosted SearXNG container below. These set the
      # instance-wide connection; the model still needs Web Search enabled
      # as a capability and Default Feature — see README "Web search" section.
      - ENABLE_RAG_WEB_SEARCH=True
      - RAG_WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>
      - RAG_WEB_SEARCH_RESULT_COUNT=3
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - open-terminal
      - searxng
    networks:
      - agent-net
    restart: unless-stopped

  open-terminal:
    build: ./open-terminal
    # ^ was: image: ghcr.io/open-webui/open-terminal
    # Now builds ./open-terminal/Dockerfile, which layers C/C++ and Java
    # toolchains on top of the official image. If you don't need compiler
    # support, you can revert to the plain `image:` line above.
    container_name: open-terminal
    # This is the sandbox: an isolated container with Python, Node, git, and
    # common data-science/CLI tools pre-installed, exposed to open-webui as
    # a set of tools (run_command, read_file, write_file, grep_search, ...)
    # over a REST API. open-webui never runs anything itself; it calls this.
    environment:
      - OPEN_TERMINAL_API_KEY=${OPEN_TERMINAL_API_KEY:-changeme-generate-a-real-key}
    volumes:
      # Open Terminal serves files from its working directory (the user's
      # home dir by default) — mounting your workspace here makes it both
      # the model's sandbox AND visible/editable from the Mac side.
      - ./workspace:/home/user
    networks:
      - agent-net
    mem_limit: 6g
    cpus: 4
    restart: unless-stopped
    # NOTE: on this default bridge network, open-terminal can also reach the
    # open internet, not just open-webui — Docker doesn't distinguish
    # "reachable by my sibling container" from "reachable by the internet"
    # without extra firewall rules. See README "Restricting network access"
    # if you want the sandbox to only reach open-webui and nothing else.

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    # Self-hosted metasearch engine — aggregates results from multiple
    # search backends without your queries going through any single
    # tracked provider. Pulled directly as an image rather than via the
    # searxng-docker repo, since that repo was archived at the end of May
    # 2026 and its docker-compose setup is no longer maintained.
    environment:
      - BASE_URL=http://searxng:8080/
      - INSTANCE_NAME=local-agent-searxng
    volumes:
      # First run auto-generates settings.yml here — you'll edit it once
      # to enable JSON output, which Open WebUI requires. See README.
      - ./searxng:/etc/searxng
    networks:
      - agent-net
    restart: unless-stopped
    # SearXNG needs a couple of Linux capabilities at first run to write
    # its config; once settings.yml exists and works, you can uncomment
    # this to drop all capabilities for a smaller attack surface:
    # cap_drop:
    #   - ALL

networks:
  agent-net:
    driver: bridge

volumes:
  open-webui-data:


